<script>

function buildDashboard(data) {

    const students = new Set();
    const countries = {};
    const paymentMethods = {};
    const revenueByDate = {};

    let totalRevenue = 0;

    data.forEach(row => {

        const email = row['الإيميل'] || row['email'];
        const country = row['الدولة'] || row['country'];
        const payment = row['وسيلة الدفع'] || row['payment_method'];

        const amount = parseFloat(
            row['المبلغ المستلم'] ||
            row['total'] ||
            0
        );

        const date = row['التاريخ'] || row['created_at'];

        if (email) students.add(email);

        if (country) {
            countries[country] =
                (countries[country] || 0) + 1;
        }

        if (payment) {
            paymentMethods[payment] =
                (paymentMethods[payment] || 0) + 1;
        }

        if (date) {
            revenueByDate[date] =
                (revenueByDate[date] || 0) + amount;
        }

        totalRevenue += amount;
    });

    document.getElementById('studentsCount').innerText =
        students.size;

    document.getElementById('revenue').innerText =
        totalRevenue.toLocaleString();

    document.getElementById('countries').innerText =
        Object.keys(countries).length;

    document.getElementById('payments').innerText =
        data.length;
}

</script>
